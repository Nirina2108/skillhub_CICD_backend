# Pipeline CI - SkillHub Backend (Laravel)
#
# But : analyser la qualite du code Laravel via SonarCloud,
#       en lui fournissant un rapport de couverture genere par PHPUnit.
#
# Le pipeline n'utilise plus aucun service Docker : les tests tournent
# sur SQLite en memoire (configure dans phpunit.xml) donc pas besoin
# de container MySQL ni MongoDB.

name: CI - SkillHub Backend

# Quand le pipeline se declenche :
#  - push sur main ou dev => analyse a chaque commit pousse
#  - pull request vers main / dev  => analyse de la PR avant fusion
on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  sonarcloud:
    name: Tests, Couverture et Analyse SonarCloud
    runs-on: ubuntu-latest

    steps:
      # Etape 1 - Checkout du code source.
      # fetch-depth: 0 clone tout l'historique git (pas juste le dernier commit).
      # Indispensable pour SonarCloud qui utilise le blame git pour savoir
      # quelles lignes sont du "New Code" recemment modifie.
      - name: Checkout du code source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Etape 2 - Installation de PHP 8.2 avec l'extension pcov.
      # pcov mesure la couverture pendant l'execution des tests
      # (quelles lignes sont parcourues, combien de fois). Sans pcov,
      # PHPUnit produirait un fichier clover.xml vide et la couverture
      # afficherait 0 % sur SonarCloud.
      - name: Installation de PHP 8.2 avec pcov
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          extensions: mbstring, xml, pdo_sqlite, pcov
          coverage: pcov

      # Etape 3 - Cache des dependances Composer.
      # Reutilise le dossier vendor d'un run precedent si composer.lock n'a
      # pas change, ce qui evite de retelecharger les paquets a chaque
      # pipeline (gain : environ 30 secondes en moyenne).
      - name: Cache des dependances Composer
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      # Etape 4 - Installation des dependances PHP via Composer.
      # --prefer-dist     : recupere les zip plutot que cloner les depots
      # --no-progress     : pas de barre de progression (logs plus propres)
      # --no-interaction  : ne pose aucune question, sinon ca bloque la CI
      - name: Installation des dependances Composer
        run: composer install --prefer-dist --no-progress --no-interaction

      # Etape 5 - Generation d'une APP_KEY pour le contexte de test.
      # Les tests bootent Laravel qui exige APP_KEY pour les sessions et le
      # chiffrement. On la genere a la volee dans la variable d'environnement
      # APP_KEY (pas dans .env, qui n'est pas commit).
      - name: Generation de la cle d'application
        run: echo "APP_KEY=base64:$(openssl rand -base64 32)" >> $GITHUB_ENV

      # Etape 6 - Creation du dossier qui recevra les rapports de test.
      # PHPUnit ne cree pas le dossier parent : si build/logs n'existe pas,
      # l'option --coverage-clover echoue silencieusement.
      - name: Preparation du dossier de rapports
        run: mkdir -p build/logs

      # Etape 7 - Execution des tests PHPUnit avec generation des rapports.
      # --coverage-clover=build/logs/clover.xml : format Clover lu par
      #     SonarCloud pour afficher la couverture ligne par ligne.
      # --log-junit=build/logs/junit.xml : format JUnit que SonarCloud lit
      #     pour afficher le nombre de tests, leur duree et leur statut.
      # Les tests utilisent SQLite en memoire (cf. phpunit.xml) donc cette
      # etape n'a pas besoin de container MySQL ni MongoDB.
      - name: Execution des tests PHPUnit avec couverture
        run: php artisan test --coverage-clover=build/logs/clover.xml --log-junit=build/logs/junit.xml

      # Etape 8 - Analyse SonarCloud.
      # Le scanner lit sonar-project.properties a la racine, parcourt les
      # fichiers PHP, recupere clover.xml et junit.xml generes a l'etape 7,
      # puis envoie le tout a SonarCloud.
      # Secrets utilises (definis dans Settings > Secrets du repo GitHub) :
      #   - GITHUB_TOKEN : fourni automatiquement, decore la PR avec les commentaires Sonar
      #   - SONAR_TOKEN  : a creer depuis SonarCloud > My Account > Security
      - name: Analyse SonarCloud
        uses: SonarSource/sonarqube-scan-action@v4
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      # Etape 9 - Verification du Quality Gate.
      # Une fois l'analyse poussee a SonarCloud, on recupere le verdict du
      # Quality Gate (seuils de bugs, vulnerabilites, couverture, etc.).
      # continue-on-error: true => meme si le QG echoue, le job reste vert.
      # Retire cette ligne si tu veux BLOQUER la PR sur un QG echoue.
      # scanMetadataReportFile : .scannerwork/report-task.txt est genere par
      # l'etape precedente. Il contient l'id de l'analyse, que cette action
      # utilise pour interroger l'API SonarCloud et recuperer le verdict.
      - name: Quality Gate
        uses: sonarsource/sonarqube-quality-gate-action@v1.1.0
        continue-on-error: true
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          scanMetadataReportFile: .scannerwork/report-task.txt
